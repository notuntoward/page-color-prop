name: Build

on:
  push:
    branches: [master, main]
    tags: ['*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ESLint and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint and build
        run: npm run build

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: page-color-prop
          path: |
            main.js
            manifest.json
            styles.css

  release:
    name: Create draft release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: page-color-prop
          path: page-color-prop

      - name: Create draft release with plugin files
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            page-color-prop/main.js
            page-color-prop/manifest.json
            page-color-prop/styles.css
